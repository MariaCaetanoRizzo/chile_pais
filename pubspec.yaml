name: chile_pais
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
   - img/
  fonts:
    - family: Cinzel
      fonts:
        - asset: fontes/Cinzel-VariableFont_wght.ttf
    - family: YujiSyuku
      fonts:
        - asset: fontes/YujiSyuku-Regular.ttf